openapi: 3.0.3
info:
  title: HRMS V2 API
  version: 1.0.0
  description: Interactive API documentation for Human Resource Management System
    V2
paths:
  /accounts/login/:
    post:
      operationId: accounts_login_create
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Login'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Login'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Login'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
          description: ''
  /accounts/reset-password/:
    post:
      operationId: accounts_reset_password_create
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPassword'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /accounts/send-otp/:
    post:
      operationId: accounts_send_otp_create
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendOTP'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendOTP'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendOTP'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /accounts/verify-otp/:
    post:
      operationId: accounts_verify_otp_create
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOTP'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyOTP'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyOTP'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          description: ''
  /api/token/:
    post:
      operationId: api_token_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: api_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /attendance/:
    get:
      operationId: attendance_list
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
        description: Filter by end date (YYYY-MM-DD)
      - in: query
        name: start_date
        schema:
          type: string
        description: Filter by start date (YYYY-MM-DD)
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendance'
          description: ''
  /attendance/check-in/:
    post:
      operationId: attendance_check_in_create
      tags:
      - attendance
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CheckInRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CheckInRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
  /attendance/check-out/:
    post:
      operationId: attendance_check_out_create
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
  /attendance/todays-attendance/:
    get:
      operationId: attendance_todays_attendance_retrieve
      tags:
      - attendance
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
  /employees/:
    get:
      operationId: employees_list
      tags:
      - employees
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Employee'
          description: ''
    post:
      operationId: employees_create
      tags:
      - employees
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
  /employees/{id}/:
    get:
      operationId: employees_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - employees
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
    put:
      operationId: employees_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - employees
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
          description: ''
    delete:
      operationId: employees_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - employees
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /holidays/:
    get:
      operationId: holidays_list
      tags:
      - holidays
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Holiday'
          description: ''
    post:
      operationId: holidays_create
      tags:
      - holidays
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Holiday'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Holiday'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Holiday'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Holiday'
          description: ''
  /holidays/{id}/:
    get:
      operationId: holidays_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - holidays
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Holiday'
          description: ''
    put:
      operationId: holidays_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - holidays
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Holiday'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Holiday'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Holiday'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Holiday'
          description: ''
    delete:
      operationId: holidays_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - holidays
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /leaves/:
    get:
      operationId: leaves_list
      tags:
      - leaves
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Leave'
          description: ''
  /leaves/{id}/:
    get:
      operationId: leaves_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - leaves
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Leave'
          description: ''
  /leaves/{id}/accept/:
    post:
      operationId: leaves_accept_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - leaves
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Leave'
          description: ''
  /leaves/{id}/reject/:
    post:
      operationId: leaves_reject_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - leaves
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Leave'
          description: ''
  /leaves/apply-leave/:
    post:
      operationId: leaves_apply_leave_create
      tags:
      - leaves
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyLeaveRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplyLeaveRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplyLeaveRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Leave'
          description: ''
  /leaves/balances/:
    get:
      operationId: leaves_balances_list
      tags:
      - leaves
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaveBalance'
          description: ''
  /leaves/types/:
    get:
      operationId: leaves_types_list
      tags:
      - leaves
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LeaveType'
          description: ''
    post:
      operationId: leaves_types_create
      tags:
      - leaves
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveType'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LeaveType'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LeaveType'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveType'
          description: ''
components:
  schemas:
    ApplyLeaveRequest:
      type: object
      properties:
        leave_type:
          type: integer
          description: Leave Type ID
        dates:
          type: array
          items:
            type: string
            format: date
          description: List of dates in YYYY-MM-DD format
        reason:
          type: string
          description: Reason for applying
      required:
      - dates
      - leave_type
      - reason
    Attendance:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        selfie:
          type: string
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        check_in:
          type: string
          format: date-time
          nullable: true
        check_out:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/AttendanceStatusEnum'
        employee:
          type: integer
      required:
      - date
      - employee
      - id
      - selfie
    AttendanceStatusEnum:
      enum:
      - PRESENT
      - ABSENT
      - HALF_DAY
      type: string
      description: |-
        * `PRESENT` - Present
        * `ABSENT` - Absent
        * `HALF_DAY` - Half Day
    CheckInRequest:
      type: object
      properties:
        selfie:
          type: string
          format: uri
          description: Selfie image of the employee checking in
      required:
      - selfie
    Employee:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        profile_image:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 15
        role:
          $ref: '#/components/schemas/RoleEnum'
        designation:
          type: string
          maxLength: 100
        department:
          type: string
          maxLength: 100
        joining_date:
          type: string
          format: date
        user:
          type: integer
          nullable: true
        company:
          type: integer
          nullable: true
      required:
      - department
      - designation
      - email
      - id
      - joining_date
      - name
      - phone
      - profile_image
    EmployeeCreate:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        company:
          type: integer
          nullable: true
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          default: EMPLOYEE
        designation:
          type: string
        department:
          type: string
        joining_date:
          type: string
          format: date
        profile_image:
          type: string
          format: uri
          nullable: true
      required:
      - department
      - designation
      - email
      - joining_date
      - name
      - password
      - phone
      - username
    EmployeeLoginData:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        company:
          type: string
          nullable: true
      required:
      - company
      - name
      - role
    EmployeeUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 15
        role:
          $ref: '#/components/schemas/RoleEnum'
        designation:
          type: string
          maxLength: 100
        department:
          type: string
          maxLength: 100
        joining_date:
          type: string
          format: date
        profile_image:
          type: string
          format: uri
          nullable: true
      required:
      - department
      - designation
      - email
      - joining_date
      - name
      - phone
    Holiday:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        company:
          type: integer
          nullable: true
        name:
          type: string
          maxLength: 100
        date:
          type: string
          format: date
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - date
      - id
      - name
    Leave:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        employee:
          type: integer
          readOnly: true
        employee_name:
          type: string
          readOnly: true
        leave_type:
          type: integer
          nullable: true
        leave_type_name:
          type: string
          readOnly: true
        reason:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/LeaveStatusEnum'
          readOnly: true
        total_days:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        dates:
          type: array
          items:
            $ref: '#/components/schemas/LeaveDate'
          readOnly: true
      required:
      - created_at
      - dates
      - employee
      - employee_name
      - id
      - leave_type_name
      - reason
      - status
      - total_days
    LeaveBalance:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        employee:
          type: integer
          readOnly: true
        employee_name:
          type: string
          readOnly: true
        leave_type:
          type: integer
        leave_type_name:
          type: string
          readOnly: true
        year:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        allocated_days:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        used_days:
          type: integer
          readOnly: true
        remaining_days:
          type: string
          readOnly: true
      required:
      - allocated_days
      - employee
      - employee_name
      - id
      - leave_type
      - leave_type_name
      - remaining_days
      - used_days
      - year
    LeaveDate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        date:
          type: string
          format: date
      required:
      - date
      - id
    LeaveStatusEnum:
      enum:
      - PENDING
      - ACCEPTED
      - REJECTED
      type: string
      description: |-
        * `PENDING` - Pending
        * `ACCEPTED` - Accepted
        * `REJECTED` - Rejected
    LeaveType:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        company:
          type: integer
          nullable: true
        name:
          type: string
          maxLength: 100
        default_annual_quota:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
      required:
      - id
      - name
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password
    LoginResponse:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
        employee:
          allOf:
          - $ref: '#/components/schemas/EmployeeLoginData'
          nullable: true
      required:
      - access
      - employee
      - refresh
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    ResetPassword:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email of the user resetting password
        new_password:
          type: string
          description: New password to set
      required:
      - email
      - new_password
    RoleEnum:
      enum:
      - SUPER_ADMIN
      - ADMIN
      - HR
      - EMPLOYEE
      type: string
      description: |-
        * `SUPER_ADMIN` - Super Admin
        * `ADMIN` - Admin
        * `HR` - HR
        * `EMPLOYEE` - Employee
    SendOTP:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email of the user requesting OTP
      required:
      - email
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    VerifyOTP:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email of the user verifying OTP
        otp:
          type: string
          description: 6-digit One-Time Password
          maxLength: 6
      required:
      - email
      - otp
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
